document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

G ================= -->\n    <g id=\"letter-G\">\n      <circle cx=\"200\" cy=\"200\" r=\"140\" fill=\"var(--letter, #ffffff)\" mask=\"url(#gml-g-mask)\"><\u002Fcircle>\n    <\u002Fg>\n\n    <!-- ================= DNA (transformable via tweaks) ================= -->\n    <g id=\"dna\">\n      <g id=\"dna-inner\">\n        <g id=\"helix-strandA\" fill=\"none\" stroke-linecap=\"round\"><\u002Fg>\n        <g id=\"helix-strandB\" fill=\"none\" stroke-linecap=\"round\"><\u002Fg>\n        <g id=\"helix-rungs\" stroke-linecap=\"round\"><\u002Fg>\n        <g id=\"helix-caps\"><\u002Fg>\n      <\u002Fg>\n    <\u002Fg>\n\n    <!-- ================= M (with network knockout) ================= -->\n    <path id=\"letter-M\" fill=\"var(--letter, #ffffff)\" fill-rule=\"evenodd\" mask=\"url(#gml-letter-knockout)\" d=\"M 400 60 L 470 60 L 525 180 L 580 60 L 650 60 L 650 340 L 590 340 L 590 165 L 545 260 L 505 260 L 460 165 L 460 340 L 400 340 Z\"><\u002Fpath>\n\n    <!-- ================= BINARY (transformable + clipped to M left bar) ================= -->\n    <g id=\"binary\" clip-path=\"url(#binary-clip)\">\n      <g id=\"binary-inner\"><\u002Fg>\n    <\u002Fg>\n\n    <!-- ================= L (with network knockout) ================= -->\n    <path id=\"letter-L\" fill=\"var(--letter, #ffffff)\" mask=\"url(#gml-letter-knockout)\" d=\"M 680 60 L 740 60 L 740 285 L 890 285 L 890 340 L 680 340 Z\"><\u002Fpath>\n\n    <!-- ================= NETWORK (transformable via tweaks) ================= -->\n    <g id=\"network\">\n      <g id=\"network-inner\">\n        <g id=\"net-edges\" stroke=\"var(--netEdge, #6F93B7)\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.95\"><\u002Fg>\n        <g id=\"net-nodes\"><\u002Fg>\n      <\u002Fg>\n    <\u002Fg>\n\n    <!-- ================= CLOUD (transformable) ================= -->\n    <g id=\"cloud\">\n      <g id=\"cloud-inner\">\n        <g id=\"cloudShape\">\n          <!-- Main puffy body with a flat, well-defined bottom -->\n          <path d=\"\n            M 15 85 C -8 85, -8 45, 20 42\n            C 22 18, 60 8, 82 22\n            C 95 2, 140 2, 155 28\n            C 200 24, 215 62, 185 85\n            L 185 85 L 15 85 Z\n          \" fill=\"url(#cloudGrad)\" stroke=\"var(--cloudStroke, #3b5c82)\" stroke-width=\"1\" id=\"cloudMain\"><\u002Fpath>\n\n          <!-- Top highlight (keeps the glossy cumulus feel) -->\n          <path d=\"M 25 48 C 40 28, 78 18, 96 32 C 110 14, 148 14, 160 36 C 120 32, 70 38, 25 48 Z\" fill=\"url(#cloudHighlight)\" opacity=\"0.85\"><\u002Fpath>\n\n          <!-- Solid shaded base — one band, full width, reads as flat ground -->\n          <path d=\"M 15 72 L 185 72 L 185 85 L 15 85 Z\" fill=\"var(--cloudShade1, #6e93bd)\" opacity=\"0.85\"><\u002Fpath>\n\n          <!-- Crisp underline to seat the cloud -->\n          <path d=\"M 15 85 L 185 85\" stroke=\"var(--cloudShade2, #3b5c82)\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fg>\n      <\u002Fg>\n    <\u002Fg>\n  <\u002Fsvg>\n<\u002Fdiv>\n\n<div id=\"tweaks\">\n  <h3>Tweaks<\u002Fh3>\n\n  <details open=\"\"><summary>Theme &amp; Export<\u002Fsummary>\n    <div class=\"ctrl\"><label>Theme<\u002Flabel><span class=\"val\" id=\"v-theme\"><\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex; gap:6px; margin:4px 0 8px;\">\n      <button type=\"button\" id=\"theme-dark\" style=\"flex:1; padding:6px 8px; background:#1a1d26; color:#e8ecf4; border:1px solid rgba(255,255,255,0.15); border-radius:6px; cursor:pointer; font-size:11px;\">Dark<\u002Fbutton>\n      <button type=\"button\" id=\"theme-light\" style=\"flex:1; padding:6px 8px; background:#1a1d26; color:#e8ecf4; border:1px solid rgba(255,255,255,0.15); border-radius:6px; cursor:pointer; font-size:11px;\">Light<\u002Fbutton>\n    <\u002Fdiv>\n    <button type=\"button\" id=\"export-svg\" style=\"width:100%; padding:8px; background:#2E5A8A; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:11px; font-weight:600; letter-spacing:0.04em; margin-bottom:6px;\">Download SVG<\u002Fbutton>\n    <button type=\"button\" id=\"export-png\" style=\"width:100%; padding:8px; background:#2E5A8A; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:11px; font-weight:600; letter-spacing:0.04em;\">Download PNG<\u002Fbutton>\n  <\u002Fdetails>\n\n  <details open=\"\"><summary>DNA<\u002Fsummary>\n    <div class=\"ctrl\"><label>X<\u002Flabel><span class=\"val\" id=\"v-dnaX\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-dnaX\" min=\"0\" max=\"900\" step=\"1\">\n    <div class=\"ctrl\"><label>Y<\u002Flabel><span class=\"val\" id=\"v-dnaY\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-dnaY\" min=\"0\" max=\"400\" step=\"1\">\n    <div class=\"ctrl\"><label>Width<\u002Flabel><span class=\"val\" id=\"v-dnaW\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-dnaW\" min=\"40\" max=\"220\" step=\"1\">\n    <div class=\"ctrl\"><label>Height<\u002Flabel><span class=\"val\" id=\"v-dnaH\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-dnaH\" min=\"80\" max=\"360\" step=\"1\">\n    <div class=\"ctrl\"><label>Turns<\u002Flabel><span class=\"val\" id=\"v-dnaTurns\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-dnaTurns\" min=\"2\" max=\"8\" step=\"1\">\n    <div class=\"ctrl\"><label>Rungs/turn<\u002Flabel><span class=\"val\" id=\"v-dnaRungs\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-dnaRungs\" min=\"4\" max=\"14\" step=\"1\">\n    <div class=\"ctrl\"><label>Knockout pad (strands)<\u002Flabel><span class=\"val\" id=\"v-dnaKnockStrand\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-dnaKnockStrand\" min=\"0\" max=\"50\" step=\"0.2\">\n    <div class=\"ctrl\"><label>Knockout pad (rungs)<\u002Flabel><span class=\"val\" id=\"v-dnaKnockRung\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-dnaKnockRung\" min=\"0\" max=\"50\" step=\"0.2\">\n  <\u002Fdetails>\n\n  <details><summary>Binary (1s &amp; 0s)<\u002Fsummary>\n    <div class=\"ctrl\"><label>X<\u002Flabel><span class=\"val\" id=\"v-binX\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-binX\" min=\"350\" max=\"700\" step=\"1\">\n    <div class=\"ctrl\"><label>Y<\u002Flabel><span class=\"val\" id=\"v-binY\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-binY\" min=\"40\" max=\"260\" step=\"1\">\n    <div class=\"ctrl\"><label>Width<\u002Flabel><span class=\"val\" id=\"v-binW\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-binW\" min=\"30\" max=\"120\" step=\"1\">\n    <div class=\"ctrl\"><label>Height<\u002Flabel><span class=\"val\" id=\"v-binH\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-binH\" min=\"60\" max=\"280\" step=\"1\">\n    <div class=\"ctrl\"><label>Font size<\u002Flabel><span class=\"val\" id=\"v-binFont\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-binFont\" min=\"6\" max=\"20\" step=\"1\">\n    <div class=\"ctrl\"><label>Row gap<\u002Flabel><span class=\"val\" id=\"v-binGap\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-binGap\" min=\"1\" max=\"8\" step=\"1\">\n    <div class=\"ctrl\"><label>Knockout pad<\u002Flabel><span class=\"val\" id=\"v-binKnockPad\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-binKnockPad\" min=\"0\" max=\"20\" step=\"0.1\">\n  <\u002Fdetails>\n\n  <details><summary>Network<\u002Fsummary>\n    <div class=\"ctrl\"><label>X<\u002Flabel><span class=\"val\" id=\"v-netX\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-netX\" min=\"300\" max=\"900\" step=\"1\">\n    <div class=\"ctrl\"><label>Y<\u002Flabel><span class=\"val\" id=\"v-netY\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-netY\" min=\"-100\" max=\"300\" step=\"1\">\n    <div class=\"ctrl\"><label>Width<\u002Flabel><span class=\"val\" id=\"v-netW\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-netW\" min=\"120\" max=\"520\" step=\"1\">\n    <div class=\"ctrl\"><label>Height<\u002Flabel><span class=\"val\" id=\"v-netH\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-netH\" min=\"60\" max=\"320\" step=\"1\">\n    <div class=\"ctrl\"><label>Nodes<\u002Flabel><span class=\"val\" id=\"v-netNodes\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-netNodes\" min=\"8\" max=\"28\" step=\"1\">\n    <div class=\"ctrl\"><label>Edge width<\u002Flabel><span class=\"val\" id=\"v-netEdgeW\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-netEdgeW\" min=\"0.4\" max=\"4\" step=\"0.1\">\n    <div class=\"ctrl\"><label>Node size<\u002Flabel><span class=\"val\" id=\"v-netNodeR\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-netNodeR\" min=\"2\" max=\"8\" step=\"0.2\">\n    <div class=\"ctrl\"><label>Knockout pad (edges)<\u002Flabel><span class=\"val\" id=\"v-netKnockEdge\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-netKnockEdge\" min=\"0\" max=\"50\" step=\"0.2\">\n    <div class=\"ctrl\"><label>Knockout pad (nodes)<\u002Flabel><span class=\"val\" id=\"v-netKnockNode\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-netKnockNode\" min=\"0\" max=\"12\" step=\"0.2\">\n  <\u002Fdetails>\n\n  <details><summary>Cloud<\u002Fsummary>\n    <div class=\"ctrl\"><label>X<\u002Flabel><span class=\"val\" id=\"v-cloudX\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-cloudX\" min=\"400\" max=\"900\" step=\"1\">\n    <div class=\"ctrl\"><label>Y<\u002Flabel><span class=\"val\" id=\"v-cloudY\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-cloudY\" min=\"140\" max=\"400\" step=\"1\">\n    <div class=\"ctrl\"><label>Width<\u002Flabel><span class=\"val\" id=\"v-cloudW\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-cloudW\" min=\"100\" max=\"380\" step=\"1\">\n    <div class=\"ctrl\"><label>Height<\u002Flabel><span class=\"val\" id=\"v-cloudH\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-cloudH\" min=\"50\" max=\"220\" step=\"1\">\n    <div class=\"ctrl\"><label>Knockout pad<\u002Flabel><span class=\"val\" id=\"v-cloudKnockPad\"><\u002Fspan><\u002Fdiv>\n    <input type=\"range\" id=\"t-cloudKnockPad\" min=\"0\" max=\"20\" step=\"0.1\">\n  <\u002Fdetails>\n<\u002Fdiv>\n\n<script>\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"dnaX\": 162,\n    \"dnaY\": 67,\n    \"dnaW\": 57,\n    \"dnaH\": 266,\n    \"dnaTurns\": 2,\n    \"dnaRungs\": 7,\n    \"binX\": 395,\n    \"binY\": 165,\n    \"binW\": 66,\n    \"binH\": 177,\n    \"binFont\": 9,\n    \"binGap\": 2,\n    \"binKnockPad\": 19.3,\n    \"netX\": 568,\n    \"netY\": 49,\n    \"netW\": 187,\n    \"netH\": 116,\n    \"netNodes\": 19,\n    \"netEdgeW\": 0.9,\n    \"netNodeR\": 5.2,\n    \"netKnockEdge\": 14.2,\n    \"netKnockNode\": 8.8,\n    \"dnaKnockStrand\": 20,\n    \"dnaKnockRung\": 18.6,\n    \"cloudX\": 722,\n    \"cloudY\": 248,\n    \"cloudW\": 174,\n    \"cloudH\": 108,\n    \"cloudKnockPad\": 9.9,\n    \"theme\": \"dark\"\n  }/*EDITMODE-END*/;\n\n  const state = { ...TWEAK_DEFAULTS };\n\n  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}\n\n  // ---------- DNA: strands + rungs generated from the same sine sampling ----------\n  function buildDNA(){\n    const sA = document.getElementById('helix-strandA');\n    const sB = document.getElementById('helix-strandB');\n    const rG = document.getElementById('helix-rungs');\n    const cG = document.getElementById('helix-caps');\n\n    const turns = state.dnaTurns;\n    const rungsPerTurn = state.dnaRungs;\n    const totalRungs = turns * rungsPerTurn;\n    const samples = 220;\n\n    const ptsA = [], ptsB = [];\n    for (let i=0; i<=samples; i++){\n      const t = i/samples;\n      const phase = t * turns * Math.PI * 2;\n      const s = Math.sin(phase);\n      ptsA.push([50 + 45*s, t*100]);\n      ptsB.push([50 - 45*s, t*100]);\n    }\n    const toPath = pts => \"M \" + pts.map(p => p[0].toFixed(2)+\" \"+p[1].toFixed(2)).join(\" L \");\n    sA.innerHTML = `<path d=\"${toPath(ptsA)}\" fill=\"none\" stroke=\"var(--strandA, #2E5A8A)\" stroke-width=\"3\" stroke-linecap=\"round\"/>`;\n    sB.innerHTML = `<path d=\"${toPath(ptsB)}\" fill=\"none\" stroke=\"var(--strandB, #BFD4E8)\" stroke-width=\"3\" stroke-linecap=\"round\"/>`;\n\n    let rungsHTML = '';\n    for (let k=0; k<totalRungs; k++){\n      const t = (k+0.5)/totalRungs;\n      const y = t*100;\n      const phase = t * turns * Math.PI * 2;\n      const s = Math.sin(phase);\n      const xA = 50 + 45*s;\n      const xB = 50 - 45*s;\n      if (Math.abs(xA - xB) < 6) continue;\n      const col = (k%2===0) ? 'var(--rung1, #4a86bf)' : 'var(--rung2, #6fa3d0)';\n      rungsHTML += `<line x1=\"${xA.toFixed(2)}\" y1=\"${y.toFixed(2)}\" x2=\"${xB.toFixed(2)}\" y2=\"${y.toFixed(2)}\" stroke=\"${col}\" stroke-width=\"1.6\" stroke-linecap=\"round\"/>`;\n    }\n    rG.innerHTML = rungsHTML;\n\n    cG.innerHTML = `\n      <circle cx=\"50\" cy=\"0\"   r=\"2.5\" fill=\"var(--capFill, #E3ECF5)\" stroke=\"var(--capStroke, #1F3E60)\" stroke-width=\"0.8\"/>\n      <circle cx=\"50\" cy=\"100\" r=\"2.5\" fill=\"var(--capFill, #E3ECF5)\" stroke=\"var(--capStroke, #1F3E60)\" stroke-width=\"0.8\"/>\n    `;\n  }\n\n  // ---------- BINARY ----------\n  function buildBinary(){\n    const inner = document.getElementById('binary-inner');\n    const clipRect = document.getElementById('binary-clip-rect');\n    clipRect.setAttribute('x', state.binX);\n    clipRect.setAttribute('y', state.binY);\n    clipRect.setAttribute('width', state.binW);\n    clipRect.setAttribute('height', state.binH);\n\n    const font = state.binFont;\n    const gap = state.binGap;\n    const rowH = font + gap;\n    const rows = Math.floor(state.binH / rowH);\n    const cx = state.binX + state.binW/2;\n    const digitW = font * 0.62;\n    const digits = Math.max(2, Math.floor((state.binW - 4) / digitW));\n\n    // Accent palette sampled from DNA + cloud (resolved from CSS vars so it tracks theme)\n    const cs = getComputedStyle(document.body);\n    const accentVars = ['--strandA','--strandB','--rung1','--rung2','--cloud1','--cloud2','--cloudShade2'];\n    const accents = accentVars.map(v => cs.getPropertyValue(v).trim()).filter(Boolean);\n\n    const rng = mulberry32(1337);\n    // Base group — default binary fill\n    let html = `<g font-family=\"ui-monospace,'SF Mono',Menlo,Consolas,monospace\"\n                   font-size=\"${font}\" font-weight=\"700\" fill=\"var(--binFill, #2E5A8A)\" text-anchor=\"middle\">`;\n    const pad = state.binKnockPad || 0;\n    let kHtml = `<g font-family=\"ui-monospace,'SF Mono',Menlo,Consolas,monospace\"\n                    font-size=\"${font}\" font-weight=\"700\" fill=\"black\" stroke=\"black\" stroke-width=\"${pad.toFixed(2)}\" stroke-linejoin=\"round\" text-anchor=\"middle\">`;\n\n    // Highlight rate: ~22% of digits get an accent color\n    const HIGHLIGHT_RATE = 0.22;\n    const charW = digitW; // approx advance per glyph in monospace\n\n    for (let r=0; r<rows; r++){\n      const y = state.binY + font + r*rowH;\n      // Build row: split into runs of same color for compact <tspan>s\n      const bits = [];\n      for (let d=0; d<digits; d++) bits.push(rng() < 0.5 ? '0' : '1');\n      const colors = bits.map(() => (rng() < HIGHLIGHT_RATE && accents.length) ? accents[Math.floor(rng()*accents.length)] : null);\n\n      // Base text uses default fill; accented glyphs get tspan with explicit fill.\n      // Left-anchored via x=startX so tspans don't need individual x coords.\n      const rowStr = bits.join('');\n      const startX = cx - (digits * charW)/2 + charW/2;\n      // Compose as a single <text> with one <tspan> per run (grouping adjacent same-color glyphs)\n      let inner_t = '';\n      let i = 0;\n      while (i < bits.length){\n        let j = i;\n        while (j < bits.length && colors[j] === colors[i]) j++;\n        const run = bits.slice(i, j).join('');\n        const runColor = colors[i];\n        if (runColor){\n          inner_t += `<tspan fill=\"${runColor}\">${run}<\u002Ftspan>`;\n        } else {\n          inner_t += `<tspan>${run}<\u002Ftspan>`;\n        }\n        i = j;\n      }\n      html += `<text x=\"${startX.toFixed(2)}\" y=\"${y}\" text-anchor=\"start\" textLength=\"${(digits*charW).toFixed(2)}\" lengthAdjust=\"spacingAndGlyphs\">${inner_t}<\u002Ftext>`;\n      // Knockout version is unchanged — needs to cover all digits regardless of color\n      kHtml += `<text x=\"${cx}\" y=\"${y}\">${rowStr}<\u002Ftext>`;\n    }\n    html += '<\u002Fg>';\n    kHtml += '<\u002Fg>';\n    inner.innerHTML = html;\n    const knockBin = document.getElementById('gml-knockout-binary');\n    if (knockBin) knockBin.innerHTML = kHtml;\n  }\n\n  // ---------- NETWORK ----------\n  function buildNetwork(){\n    const edgesG = document.getElementById('net-edges');\n    const nodesG = document.getElementById('net-nodes');\n    const knockDots  = document.getElementById('gml-knockout-dots');\n    const knockEdges = document.getElementById('gml-knockout-edges');\n    const gKnockDots  = document.getElementById('g-knockout-net-dots');\n    const gKnockEdges = document.getElementById('g-knockout-net-edges');\n\n    const N = state.netNodes;\n    const rng = mulberry32(42);\n\n    // Best-candidate sampling: for each new node, try a few random spots and\n    // pick the one furthest from existing nodes. Gives an even, organic spread\n    // across the whole area (no bottom row bias).\n    const nodes = [];\n    const X_MIN = 6, X_MAX = 94;   // usable horizontal range (unit space 0-100)\n    const Y_MIN = 6, Y_MAX = 94;   // usable vertical range\n    const MIN_DIST_SQ = 64;        // hard minimum separation\n    const CANDIDATES = 14;         // candidates per placement\n    let attempts = 0;\n    while (nodes.length < N && attempts < N * 40){\n      attempts++;\n      let best = null;\n      let bestScore = -1;\n      for (let c=0; c<CANDIDATES; c++){\n        const x = X_MIN + rng() * (X_MAX - X_MIN);\n        const y = Y_MIN + rng() * (Y_MAX - Y_MIN);\n        let minD2 = Infinity;\n        for (const n of nodes){\n          const d2 = (n.x-x)**2 + (n.y-y)**2;\n          if (d2 < minD2) minD2 = d2;\n        }\n        if (nodes.length === 0) { best = {x,y}; bestScore = Infinity; break; }\n        if (minD2 >= MIN_DIST_SQ && minD2 > bestScore){\n          bestScore = minD2;\n          best = {x, y};\n        }\n      }\n      if (best) nodes.push(best);\n    }\n\n    // Fully connect: every pair of nodes gets an edge\n    const edges = new Set();\n    const key = (a,b) => a<b ? `${a}-${b}` : `${b}-${a}`;\n    for (let i=0; i<nodes.length; i++){\n      for (let j=i+1; j<nodes.length; j++){\n        edges.add(key(i,j));\n      }\n    }\n\n    let eH = '', nH = '';\n    for (const e of edges){\n      const [a,b] = e.split('-').map(Number);\n      eH += `<line x1=\"${nodes[a].x.toFixed(2)}\" y1=\"${nodes[a].y.toFixed(2)}\" x2=\"${nodes[b].x.toFixed(2)}\" y2=\"${nodes[b].y.toFixed(2)}\"/>`;\n    }\n    const sx = state.netW/100, sy = state.netH/100;\n    const nodeR_unit = state.netNodeR / Math.min(sx, sy);\n    const edgeW_unit = state.netEdgeW / Math.min(sx, sy);\n\n    // Darker accent palette sampled from DNA + cloud (tracks theme via CSS vars)\n    const cs = getComputedStyle(document.body);\n    const darkAccentVars = ['--strandA','--rung1','--node2','--cloudShade2','--cloudShade1','--capStroke'];\n    const darkAccents = darkAccentVars.map(v => cs.getPropertyValue(v).trim()).filter(Boolean);\n    const NODE_ACCENT_RATE = 0.35;\n\n    nodes.forEach((n,i)=>{\n      const r = nodeR_unit * (0.8 + rng()*0.55);\n      const useAccent = rng() < NODE_ACCENT_RATE && darkAccents.length;\n      const fill = useAccent ? darkAccents[Math.floor(rng()*darkAccents.length)] : 'url(#nodeFill)';\n      nH += `<circle cx=\"${n.x.toFixed(2)}\" cy=\"${n.y.toFixed(2)}\" r=\"${r.toFixed(2)}\" fill=\"${fill}\" stroke=\"var(--netStroke, #1F3E60)\" stroke-width=\"${(0.9/Math.min(sx,sy)).toFixed(2)}\"/>`;\n    });\n\n    edgesG.setAttribute('stroke-width', edgeW_unit.toFixed(2));\n    edgesG.innerHTML = eH;\n    nodesG.innerHTML = nH;\n\n    // Project to absolute coords for knockout masks\n    let kDots = '', kEdges = '';\n    nodes.forEach((n, i) => {\n      const ax = state.netX + n.x * sx;\n      const ay = state.netY + n.y * sy;\n      const r  = state.netNodeR * 0.95 + state.netKnockNode;\n      kDots += `<circle cx=\"${ax.toFixed(2)}\" cy=\"${ay.toFixed(2)}\" r=\"${r.toFixed(2)}\" fill=\"black\"/>`;\n    });\n    for (const e of edges){\n      const [a,b] = e.split('-').map(Number);\n      const ax1 = state.netX + nodes[a].x * sx, ay1 = state.netY + nodes[a].y * sy;\n      const ax2 = state.netX + nodes[b].x * sx, ay2 = state.netY + nodes[b].y * sy;\n      kEdges += `<line x1=\"${ax1.toFixed(2)}\" y1=\"${ay1.toFixed(2)}\" x2=\"${ax2.toFixed(2)}\" y2=\"${ay2.toFixed(2)}\" stroke=\"black\" stroke-width=\"${(state.netEdgeW + state.netKnockEdge).toFixed(2)}\" stroke-linecap=\"round\"/>`;\n    }\n    // Apply to both M/L mask AND G mask so whichever letter is under the network goes transparent\n    knockDots.innerHTML  = kDots;\n    knockEdges.innerHTML = kEdges;\n    if (gKnockDots)  gKnockDots.innerHTML  = kDots;\n    if (gKnockEdges) gKnockEdges.innerHTML = kEdges;\n  }\n\n  // ---------- DNA KNOCKOUT (punches holes in the G where helix + rungs sit) ----------\n  function buildDNAKnockout(){\n    const dest = document.getElementById('g-knockout-dna');\n    if (!dest) return;\n\n    const turns = state.dnaTurns;\n    const rungsPerTurn = state.dnaRungs;\n    const totalRungs = turns * rungsPerTurn;\n    const samples = 60;\n\n    // Absolute position of unit (ux, uy) = (dnaX + ux * dnaW/100, dnaY + uy * dnaH/100)\n    const tx = state.dnaX, ty = state.dnaY;\n    const sx = state.dnaW / 100, sy = state.dnaH / 100;\n\n    // Two strand stroked paths (stroke wider than the visible strand so knockout is a bit larger)\n    const ptsA = [], ptsB = [];\n    for (let i=0; i<=samples; i++){\n      const t = i/samples;\n      const phase = t * turns * Math.PI * 2;\n      const s = Math.sin(phase);\n      const ax = (50 + 45*s) * sx + tx;\n      const bx = (50 - 45*s) * sx + tx;\n      const y  = (t*100) * sy + ty;\n      ptsA.push([ax, y]);\n      ptsB.push([bx, y]);\n    }\n    const toPath = pts => \"M \" + pts.map(p => p[0].toFixed(2)+\" \"+p[1].toFixed(2)).join(\" L \");\n\n    // Strand width in absolute: visible stroke=3 in unit space, so ≈ 3*min(sx,sy). Add padding.\n    const strandW = 3 * Math.min(sx, sy) + state.dnaKnockStrand;\n\n    let html = '';\n    html += `<path d=\"${toPath(ptsA)}\" fill=\"none\" stroke=\"black\" stroke-width=\"${strandW.toFixed(2)}\" stroke-linecap=\"round\"/>`;\n    html += `<path d=\"${toPath(ptsB)}\" fill=\"none\" stroke=\"black\" stroke-width=\"${strandW.toFixed(2)}\" stroke-linecap=\"round\"/>`;\n\n    const rungW = 1.6 * Math.min(sx, sy) + state.dnaKnockRung;\n    for (let k=0; k<totalRungs; k++){\n      const t = (k+0.5)/totalRungs;\n      const phase = t * turns * Math.PI * 2;\n      const s = Math.sin(phase);\n      if (Math.abs(2*45*s) < 6) continue;\n      const ax = (50 + 45*s) * sx + tx;\n      const bx = (50 - 45*s) * sx + tx;\n      const y  = (t*100) * sy + ty;\n      html += `<line x1=\"${ax.toFixed(2)}\" y1=\"${y.toFixed(2)}\" x2=\"${bx.toFixed(2)}\" y2=\"${y.toFixed(2)}\" stroke=\"black\" stroke-width=\"${rungW.toFixed(2)}\" stroke-linecap=\"round\"/>`;\n    }\n    dest.innerHTML = html;\n  }\n\n  function applyTransforms(){\n    const dna = document.getElementById('dna');\n    dna.setAttribute('transform', `translate(${state.dnaX} ${state.dnaY}) scale(${state.dnaW/100} ${state.dnaH/100})`);\n\n    const net = document.getElementById('network');\n    net.setAttribute('transform', `translate(${state.netX} ${state.netY}) scale(${state.netW/100} ${state.netH/100})`);\n\n    const cloud = document.getElementById('cloud');\n    cloud.setAttribute('transform', `translate(${state.cloudX} ${state.cloudY}) scale(${state.cloudW/200} ${state.cloudH/100})`);\n\n    // Cloud knockout — silhouette painted black into the M/L mask so the cloud shape punches through the letters.\n    const cloudKnock = document.getElementById('gml-knockout-cloud');\n    if (cloudKnock){\n      const sx = state.cloudW/200, sy = state.cloudH/100;\n      const sMin = Math.min(sx, sy) || 1;\n      const pad = (state.cloudKnockPad || 0) / sMin;\n      cloudKnock.setAttribute('transform', `translate(${state.cloudX} ${state.cloudY}) scale(${sx} ${sy})`);\n      cloudKnock.innerHTML = `<path d=\"M 15 85 C -8 85, -8 45, 20 42 C 22 18, 60 8, 82 22 C 95 2, 140 2, 155 28 C 200 24, 215 62, 185 85 L 185 85 L 15 85 Z\" fill=\"black\" stroke=\"black\" stroke-width=\"${pad.toFixed(2)}\" stroke-linejoin=\"round\"/>`;\n    }\n  }\n\n  function apply(){\n    buildDNA();\n    buildBinary();\n    buildNetwork();\n    buildDNAKnockout();\n    applyTransforms();\n\n    for (const k of Object.keys(state)){\n      const v = document.getElementById('v-' + k);\n      if (v) v.textContent = state[k];\n      const inp = document.getElementById('t-' + k);\n      if (inp && document.activeElement !== inp) inp.value = state[k];\n    }\n  }\n\n  document.querySelectorAll('#tweaks input[type=range]').forEach(inp => {\n    const key = inp.id.replace(/^t-/, '');\n    if (state[key] === undefined) return;\n    inp.value = state[key];\n    inp.addEventListener('input', () => {\n      const v = parseFloat(inp.value);\n      state[key] = (inp.step && parseFloat(inp.step) >= 1) ? Math.round(v) : v;\n      apply();\n      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]: state[key]}}, '*');\n    });\n  });\n\n  window.addEventListener('message', e => {\n    const d = e.data || {};\n    if (d.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('open');\n    if (d.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('open');\n  });\n  window.parent.postMessage({type:'__edit_mode_available'}, '*');\n\n  // ---------- THEME ----------\n  function applyGradientStopsForTheme(){\n    const cs = getComputedStyle(document.body);\n    const get = k => cs.getPropertyValue(k).trim();\n    const map = {\n      'node0': '--node0', 'node1': '--node1', 'node2': '--node2',\n      'cloudGrad0': '--cloud0', 'cloudGrad1': '--cloud1', 'cloudGrad2': '--cloud2',\n    };\n    for (const [id, v] of Object.entries(map)){\n      const el = document.getElementById(id);\n      const c = get(v);\n      if (el && c) el.setAttribute('stop-color', c);\n    }\n  }\n\n  function setTheme(t){\n    state.theme = t;\n    document.body.classList.toggle('theme-dark',  t === 'dark');\n    document.body.classList.toggle('theme-light', t === 'light');\n    applyGradientStopsForTheme();\n    // Rebuild binary so accent colors re-sample from the new theme's CSS vars\n    if (typeof buildBinary === 'function') buildBinary();\n    if (typeof buildNetwork === 'function') buildNetwork();\n    const vSpan = document.getElementById('v-theme');\n    if (vSpan) vSpan.textContent = t;\n    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{theme: t}}, '*');\n  }\n  document.getElementById('theme-dark').addEventListener('click',  () => setTheme('dark'));\n  document.getElementById('theme-light').addEventListener('click', () => setTheme('light'));\n  setTheme(state.theme || 'dark');\n\n  // ---------- SVG EXPORT ----------\n  // Resolve all CSS variables to concrete colors for portable export\n  function resolveThemeColors(){\n    const cs = getComputedStyle(document.body);\n    const keys = ['--letter','--strandA','--strandB','--rung1','--rung2','--capFill','--capStroke','--netEdge','--netStroke','--binFill','--cloudStroke','--cloudShade1','--cloudShade2'];\n    const out = {};\n    keys.forEach(k => out[k] = cs.getPropertyValue(k).trim() || '');\n    return out;\n  }\n\n  function buildExportSVG(){\n    const src = document.getElementById('logo');\n    const clone = src.cloneNode(true);\n    const bg = state.theme === 'light' ? '#ffffff' : '#000000';\n    const c = resolveThemeColors();\n    let xml = new XMLSerializer().serializeToString(clone);\n    // Replace each var(--X, fallback) with the resolved color\n    xml = xml.replace(/var\\(--letter,\\s*#ffffff\\)/g, c['--letter'] || '#ffffff')\n             .replace(/var\\(--strandA,\\s*#2E5A8A\\)/g, c['--strandA'] || '#2E5A8A')\n             .replace(/var\\(--strandB,\\s*#BFD4E8\\)/g, c['--strandB'] || '#BFD4E8')\n             .replace(/var\\(--rung1,\\s*#4a86bf\\)/g, c['--rung1'] || '#4a86bf')\n             .replace(/var\\(--rung2,\\s*#6fa3d0\\)/g, c['--rung2'] || '#6fa3d0')\n             .replace(/var\\(--capFill,\\s*#E3ECF5\\)/g, c['--capFill'] || '#E3ECF5')\n             .replace(/var\\(--capStroke,\\s*#1F3E60\\)/g, c['--capStroke'] || '#1F3E60')\n             .replace(/var\\(--netEdge,\\s*#6F93B7\\)/g, c['--netEdge'] || '#6F93B7')\n             .replace(/var\\(--netStroke,\\s*#1F3E60\\)/g, c['--netStroke'] || '#1F3E60')\n             .replace(/var\\(--binFill,\\s*#2E5A8A\\)/g, c['--binFill'] || '#2E5A8A')\n             .replace(/var\\(--cloudStroke,\\s*#3b5c82\\)/g, c['--cloudStroke'] || '#3b5c82')\n             .replace(/var\\(--cloudShade1,\\s*#6e93bd\\)/g, c['--cloudShade1'] || '#6e93bd')\n             .replace(/var\\(--cloudShade2,\\s*#3b5c82\\)/g, c['--cloudShade2'] || '#3b5c82');\n    // Inject a background rect right after <svg ...>\n    xml = xml.replace(/<svg([^>]*)>/, `<svg$1><rect width=\"900\" height=\"400\" fill=\"${bg}\"/>`);\n    return '<?xml version=\"1.0\" encoding=\"UTF-8\"?>\\n' + xml;\n  }\n\n  document.getElementById('export-svg').addEventListener('click', () => {\n    const xml = buildExportSVG();\n    const blob = new Blob([xml], {type:'image/svg+xml'});\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url; a.download = `gml-logo-${state.theme}.svg`;\n    document.body.appendChild(a); a.click(); a.remove();\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n  });\n\n  document.getElementById('export-png').addEventListener('click', () => {\n    const xml = buildExportSVG();\n    const svgBlob = new Blob([xml], {type:'image/svg+xml;charset=utf-8'});\n    const url = URL.createObjectURL(svgBlob);\n    const img = new Image();\n    img.onload = () => {\n      const scale = 4; // 3600x1600 @ 4x\n      const canvas = document.createElement('canvas');\n      canvas.width = 900 * scale; canvas.height = 400 * scale;\n      const ctx = canvas.getContext('2d');\n      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);\n      URL.revokeObjectURL(url);\n      canvas.toBlob(b => {\n        const pngUrl = URL.createObjectURL(b);\n        const a = document.createElement('a');\n        a.href = pngUrl; a.download = `gml-logo-${state.theme}.png`;\n        document.body.appendChild(a); a.click(); a.remove();\n        setTimeout(() => URL.revokeObjectURL(pngUrl), 1000);\n      }, 'image/png');\n    };\n    img.onerror = (e) => { console.error('PNG export failed', e); URL.revokeObjectURL(url); };\n    img.src = url;\n  });\n\n  apply();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
